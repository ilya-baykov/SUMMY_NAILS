{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход · Nails Pro</title>
    <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}" />
  </head>
  <body>
    <main class="app-shell auth-shell">
      <header class="profile-header">
        <div class="avatar">АК</div>
        <div>
          <h1>Nails Pro</h1>
          <div class="badges">
            <span>Личный кабинет</span>
          </div>
        </div>
      </header>

      <form class="data-form" method="post">
        {% csrf_token %}
        <label>
          <span>Логин</span>
          <input name="username" autocomplete="username" required />
        </label>
        <label>
          <span>Пароль</span>
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        {% if error %}
          <p class="danger-text">{{ error }}</p>
        {% endif %}
        <button class="primary small" type="submit">Войти</button>
      </form>

      <section class="info-card auth-hint">
        <div>
          <strong>Демо-доступы</strong>
          <p>master / demo12345 · admin / demo12345 · owner / demo12345</p>
        </div>
      </section>
    </main>
  </body>
</html>
